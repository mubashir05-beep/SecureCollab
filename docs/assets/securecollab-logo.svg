<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-labelledby="title desc">
  <title id="title">SecureCollab Logo</title>
  <desc id="desc">Shield and linked nodes with SecureCollab wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="960" height="240" rx="20" fill="url(#bg)" />

  <g transform="translate(36,34)">
    <path d="M84 0 L150 28 V96 C150 142 119 178 84 194 C49 178 18 142 18 96 V28 Z" fill="#0b1220" stroke="url(#accent)" stroke-width="4"/>
    <path d="M54 96 L76 118 L116 72" fill="none" stroke="url(#accent)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="180" cy="46" r="9" fill="#22c55e"/>
    <circle cx="220" cy="74" r="9" fill="#14b8a6"/>
    <circle cx="176" cy="108" r="9" fill="#34d399"/>
    <line x1="188" y1="50" x2="212" y2="70" stroke="#34d399" stroke-width="3"/>
    <line x1="212" y1="78" x2="184" y2="104" stroke="#34d399" stroke-width="3"/>
    <line x1="188" y1="108" x2="220" y2="78" stroke="#34d399" stroke-width="3" opacity="0.5"/>
  </g>

  <text x="320" y="106" fill="#f8fafc" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700">SecureCollab</text>
  <text x="320" y="150" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">Zero-Knowledge Team Messaging Infrastructure</text>
</svg>
