version: '3'

dotenv:
  - .env

tasks:
  dev:
    desc: Start local base stack
    cmd: docker compose -f deploy/docker-compose.yml up -d

  dev:down:
    desc: Stop local base stack
    cmd: docker compose -f deploy/docker-compose.yml down

  logs:
    desc: Tail logs for all docker-compose services (last 100 lines)
    cmd: docker compose -f deploy/docker-compose.yml logs -f --tail=100

  cdc:up:
    desc: Start local CDC overlay (Redpanda, Debezium Connect, ClickHouse)
    cmd: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.cdc.yml up -d redpanda connect clickhouse

  cdc:down:
    desc: Stop local CDC overlay
    cmd: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.cdc.yml down

  cdc:register:
    desc: Register Postgres Debezium connector for encrypted_messages
    cmd: |
      curl -sS -X POST "${CDC_CONNECT_URL:-http://localhost:${CONNECT_PORT:-8085}}/connectors" \
        -H "Content-Type: application/json" \
        --data @pipeline/debezium/connectors/postgres-encrypted-messages.json

  cdc:status:
    desc: Check Debezium connector status
    cmd: |
      curl -sS "${CDC_CONNECT_URL:-http://localhost:${CONNECT_PORT:-8085}}/connectors/securecollab-postgres-encrypted-messages/status"

  lint:gateway:
    desc: Lint gateway code
    dir: services/gateway
    cmds:
      - gofmt -l .
      - go vet ./...

  lint:auth:
    desc: Lint auth service code
    dir: services/auth
    cmds:
      - gofmt -l .
      - go vet ./...

  lint:keydist:
    desc: Lint key distribution service code
    dir: services/keydist
    cmds:
      - gofmt -l .
      - go vet ./...

  lint:messaging:
    desc: Lint messaging service code
    dir: services/messaging
    cmds:
      - gofmt -l .
      - go vet ./...

  lint:analytics:
    desc: Lint analytics service code
    dir: services/analytics
    cmds:
      - gofmt -l .
      - go vet ./...

  lint:workspace:
    desc: Lint workspace service code
    dir: services/workspace
    cmds:
      - gofmt -l .
      - go vet ./...

  lint:
    desc: Lint all services
    cmds:
      - task lint:gateway
      - task lint:auth
      - task lint:keydist
      - task lint:messaging
      - task lint:analytics
      - task lint:workspace

  test:gateway:
    desc: Run gateway tests
    dir: services/gateway
    cmd: go test ./...

  test:auth:
    desc: Run auth service tests
    dir: services/auth
    cmd: go test ./...

  test:auth:integration:
    desc: Run auth integration tests for store and handlers (requires AUTH_TEST_DATABASE_URL)
    dir: services/auth
    cmd: go test -tags=integration ./internal/store ./internal/handlers

  test:keydist:
    desc: Run key distribution service tests
    dir: services/keydist
    cmd: go test ./...

  test:keydist:integration:
    desc: Run key distribution integration tests (requires KEYDIST_TEST_DATABASE_URL or DATABASE_URL)
    dir: services/keydist
    cmd: go test -tags=integration ./internal/handlers

  test:messaging:
    desc: Run messaging service tests
    dir: services/messaging
    cmd: go test ./...

  test:messaging:integration:
    desc: Run messaging integration tests (requires MESSAGING_TEST_DATABASE_URL or DATABASE_URL)
    dir: services/messaging
    cmd: go test -tags=integration ./internal/handlers

  test:workspace:
    desc: Run workspace service tests
    dir: services/workspace
    cmd: go test ./...

  test:analytics:
    desc: Run analytics service tests
    dir: services/analytics
    cmd: go test ./...

  test:analytics:integration:
    desc: Run analytics integration tests (requires ANALYTICS_TEST_DATABASE_URL or DATABASE_URL)
    dir: services/analytics
    cmd: go test -tags=integration ./internal/store ./internal/handlers

  test:client:
    desc: Run client core Rust tests
    dir: client/src-tauri
    cmd: cargo test

  test:
    desc: Run all service tests
    cmds:
      - task test:gateway
      - task test:auth
      - task test:keydist
      - task test:messaging
      - task test:analytics
      - task test:workspace
      - task test:client

  check:
    desc: Run lint and tests
    cmds:
      - task lint
      - task test

  smoke:gateway:
    desc: Check gateway health endpoint
    cmd: |
      curl -f "${GATEWAY_BASE_URL:-http://localhost:${GATEWAY_PORT:-8080}}/healthz"
    ignore_error: true

  migrate:up:
    desc: Run pending database migrations
    cmd: migrate -path db/migrations -database "${DATABASE_URL}" up

  migrate:down:
    desc: Rollback last database migration
    cmd: migrate -path db/migrations -database "${DATABASE_URL}" down 1

  migrate:create:
    desc: Create new migration file (name={{NAME}})
    cmd: migrate create -ext sql -dir db/migrations -seq {{.NAME}}

  load-test:
    desc: Run k6 load test against gateway protected route
    cmd: k6 run tests/load/gateway.js

  cdc:validate:
    desc: Run CDC pipeline end-to-end validation (requires task dev + task cdc:up + task cdc:register)
    cmd: bash tests/cdc/validate.sh

  tauri:build:
    desc: Build Tauri desktop app binaries
    dir: client
    deps: [ui:install:tauri]
    cmd: npx tauri build

  ui:install:
    desc: Install Svelte UI dependencies
    dir: client/ui
    cmd: npm install

  ui:install:tauri:
    desc: Install Tauri CLI dependencies
    dir: client
    cmd: npm install
    status:
      - test -d node_modules/@tauri-apps

  ui:dev:
    desc: Launch Tauri desktop app (starts Vite + opens native window)
    dir: client
    deps: [ui:install:tauri]
    cmd: npx tauri dev

  ui:web:
    desc: Run Svelte UI in browser only (no Tauri, for quick frontend iteration)
    dir: client/ui
    cmd: npm run dev

  ui:test:
    desc: Run Svelte UI tests
    dir: client/ui
    cmd: npm run test -- --run

  dev:all:
    desc: Start full stack (backend services + Tauri desktop app)
    cmds:
      - task dev
      - echo "Waiting for services to be healthy..."
      - sleep 10
      - task ui:dev