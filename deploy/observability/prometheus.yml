global:
  scrape_interval: 15s

rule_files:
  - prometheus-alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:8080

  - job_name: auth
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth:8081
