services:
  gateway:
    build:
      context: ../services/gateway
    container_name: securecollab-gateway
    environment:
      JWT_SECRET: "${JWT_SECRET:-securecollab-dev-secret-key}"
      REDIS_ADDR: "redis:6379"
      APP_ENV: "${APP_ENV:-dev}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      - redis
    restart: on-failure

  auth:
    build:
      context: ../services/auth
    container_name: securecollab-auth
    environment:
      DATABASE_URL: "postgres://securecollab:securecollab@postgres:5432/securecollab?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-securecollab-dev-secret-key}"
      APP_ENV: "${APP_ENV:-dev}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
    ports:
      - "${AUTH_PORT:-8081}:8081"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  keydist:
    build:
      context: ../services/keydist
    container_name: securecollab-keydist
    environment:
      DATABASE_URL: "postgres://securecollab:securecollab@postgres:5432/securecollab?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-securecollab-dev-secret-key}"
      APP_ENV: "${APP_ENV:-dev}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
    ports:
      - "${KEYDIST_PORT:-8082}:8082"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  messaging:
    build:
      context: ../services/messaging
    container_name: securecollab-messaging
    environment:
      DATABASE_URL: "postgres://securecollab:securecollab@postgres:5432/securecollab?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-securecollab-dev-secret-key}"
      APP_ENV: "${APP_ENV:-dev}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
    ports:
      - "${MESSAGING_PORT:-8083}:8083"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  analytics:
    build:
      context: ../services/analytics
    container_name: securecollab-analytics
    environment:
      DATABASE_URL: "postgres://securecollab:securecollab@postgres:5432/securecollab?sslmode=disable"
    ports:
      - "${ANALYTICS_PORT:-8084}:8084"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  workspace:
    build:
      context: ../services/workspace
    container_name: securecollab-workspace
    environment:
      DATABASE_URL: "postgres://securecollab:securecollab@postgres:5432/securecollab?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-securecollab-dev-secret-key}"
      APP_ENV: "${APP_ENV:-dev}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
    ports:
      - "${WORKSPACE_PORT:-8086}:8086"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  postgres:
    image: postgres:16
    container_name: securecollab-postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_DB: securecollab
      POSTGRES_USER: securecollab
      POSTGRES_PASSWORD: securecollab
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securecollab -d securecollab"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  migrate:
    image: postgres:16
    container_name: securecollab-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../db/migrations:/migrations:ro
    entrypoint: >
      sh -c '
        echo "Running migrations..."
        for f in /migrations/*.up.sql; do
          echo "Applying $$(basename $$f)..."
          PGPASSWORD=securecollab psql -h postgres -U securecollab -d securecollab -f "$$f" 2>&1 || true
        done
        echo "Migrations complete."
      '
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: securecollab-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: securecollab-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:11.0.0
    container_name: securecollab-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.0.0
    container_name: securecollab-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: securecollab-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres_data:
