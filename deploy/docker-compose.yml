services:
  gateway:
    build:
      context: ../services/gateway
    container_name: securecollab-gateway
    environment:
      JWT_SECRET: "${JWT_SECRET:-securecollab-dev-secret-key}"
      REDIS_ADDR: "${REDIS_ADDR:-redis:6379}"
    ports:
      - "${GATEWAY_PORT:-8080}:8080"

  auth:
    build:
      context: ../services/auth
    container_name: securecollab-auth
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://securecollab:securecollab@postgres:5432/securecollab?sslmode=disable}"
      JWT_SECRET: "${JWT_SECRET:-securecollab-dev-secret-key}"
    ports:
      - "${AUTH_PORT:-8081}:8081"

  keydist:
    build:
      context: ../services/keydist
    container_name: securecollab-keydist
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://securecollab:securecollab@postgres:5432/securecollab?sslmode=disable}"
      JWT_SECRET: "${JWT_SECRET:-securecollab-dev-secret-key}"
    ports:
      - "${KEYDIST_PORT:-8082}:8082"

  messaging:
    build:
      context: ../services/messaging
    container_name: securecollab-messaging
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://securecollab:securecollab@postgres:5432/securecollab?sslmode=disable}"
      JWT_SECRET: "${JWT_SECRET:-securecollab-dev-secret-key}"
    ports:
      - "${MESSAGING_PORT:-8083}:8083"

  analytics:
    build:
      context: ../services/analytics
    container_name: securecollab-analytics
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://securecollab:securecollab@postgres:5432/securecollab?sslmode=disable}"
    ports:
      - "${ANALYTICS_PORT:-8084}:8084"

  postgres:
    image: postgres:16
    container_name: securecollab-postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_DB: securecollab
      POSTGRES_USER: securecollab
      POSTGRES_PASSWORD: securecollab
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: securecollab-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: securecollab-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:11.0.0
    container_name: securecollab-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.0.0
    container_name: securecollab-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: securecollab-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro

volumes:
  postgres_data:
